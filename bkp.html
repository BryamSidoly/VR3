<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>VR Shooter Hand Tracking</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
        }

        canvas {
            display: block;
        }

        #video {
            position: fixed;
            top: 0;
            left: 0;
            width: 160px;
            height: 120px;
            opacity: 0.01;
            pointer-events: none;
        }

        #ui {
            position: fixed;
            top: 10px;
            left: 10px;
            color: white;
            font-family: sans-serif;
            font-size: 12px;
            z-index: 10;
        }
    </style>

</head>

<body>

    <div id="ui">VR Shooter - Hand Tracking</div>
    <video id="video" autoplay playsinline></video>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>

        let scene, camera, renderer;
        let gun, handMesh;
        let targets = [];
        let handLandmarks = null;

        let deviceQuat = new THREE.Quaternion();

        init();
        animate();
        initHandTracking();

        function init() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 3);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            document.body.appendChild(renderer.domElement);

            // Luz
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 5);
            scene.add(light);

            scene.add(new THREE.AmbientLight(0xffffff, 0.4));

            // Chão
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(50, 50),
                new THREE.MeshStandardMaterial({ color: 0x222222 })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Arma (modelo simples)
            gun = new THREE.Group();

            const body = new THREE.Mesh(
                new THREE.BoxGeometry(0.3, 0.1, 0.8),
                new THREE.MeshStandardMaterial({ color: 0x333333 })
            );

            const barrel = new THREE.Mesh(
                new THREE.BoxGeometry(0.1, 0.1, 0.6),
                new THREE.MeshStandardMaterial({ color: 0x777777 })
            );

            barrel.position.z = -0.7;
            gun.add(body);
            gun.add(barrel);

            scene.add(gun);

            // Alvos
            for (let i = 0; i < 10; i++) {
                const t = new THREE.Mesh(
                    new THREE.SphereGeometry(0.2, 16, 16),
                    new THREE.MeshStandardMaterial({ color: 0xff4444 })
                );
                t.position.set(
                    (Math.random() - 0.5) * 10,
                    1 + Math.random() * 2,
                    -5 - Math.random() * 20
                );
                scene.add(t);
                targets.push(t);
            }

            // Sensor do celular
            window.addEventListener("deviceorientation", (e) => {
                const alpha = THREE.MathUtils.degToRad(e.alpha || 0);
                const beta = THREE.MathUtils.degToRad(e.beta || 0);
                const gamma = THREE.MathUtils.degToRad(e.gamma || 0);

                const euler = new THREE.Euler(beta, alpha, -gamma, "YXZ");
                deviceQuat.setFromEuler(euler);
            });

            window.addEventListener("resize", onResize);
        }

        function onResize() {
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            updateGunFromHand();
            updateTargets();

            renderVR();
        }

        function renderVR() {
            const w = window.innerWidth;
            const h = window.innerHeight;

            renderer.setScissorTest(true);

            // olho esquerdo
            renderer.setViewport(0, 0, w / 2, h);
            renderer.setScissor(0, 0, w / 2, h);
            camera.position.set(-0.03, 1.6, 3);
            camera.quaternion.copy(deviceQuat);
            renderer.render(scene, camera);

            // olho direito
            renderer.setViewport(w / 2, 0, w / 2, h);
            renderer.setScissor(w / 2, 0, w / 2, h);
            camera.position.set(0.03, 1.6, 3);
            camera.quaternion.copy(deviceQuat);
            renderer.render(scene, camera);

            renderer.setScissorTest(false);
        }

        function updateTargets() {
            targets.forEach(t => {
                t.rotation.y += 0.01;
            });
        }

        function updateGunFromHand() {
            if (!handLandmarks) return;

            // pontos principais da mão
            const wrist = handLandmarks[0];
            const index = handLandmarks[8];
            const thumb = handLandmarks[4];

            // profundidade estimada
            const dx = index.x - wrist.x;
            const dy = index.y - wrist.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            // posição normalizada para mundo 3D
            const x = (handLandmarks[8].x - 0.5) * 4;
            const y = (0.5 - handLandmarks[8].y) * 3 + 1.5;
            const z = -dist * 8;

            gun.position.set(x, y, z);

            // rotação baseada no vetor mão
            gun.lookAt(x + dx * 10, y - dy * 10, z - 5);

            // tiro simples (pinça)
            const pinch = Math.sqrt(
                Math.pow(thumb.x - index.x, 2) +
                Math.pow(thumb.y - index.y, 2)
            );

            if (pinch < 0.03) {
                shoot();
            }
        }

        function shoot() {
            const ray = new THREE.Raycaster();
            const dir = new THREE.Vector3(0, 0, -1);
            dir.applyQuaternion(gun.quaternion);

            ray.set(gun.position, dir);

            const hit = ray.intersectObjects(targets);
            if (hit.length > 0) {
                hit[0].object.position.z = -20 - Math.random() * 20;
            }
        }

        function initHandTracking() {
            const videoElement = document.getElementById("video");

            const hands = new Hands({
                locateFile: (file) =>
                    `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7,
                selfieMode: false // IMPORTANTE: desliga espelhamento automático
            });

            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {

                    let lm = results.multiHandLandmarks[0];

                    // =========================
                    // CORREÇÃO DE ORIENTAÇÃO
                    // =========================
                    // Corrige landscape (topo esquerda)
                    handLandmarks = lm.map(p => ({
                        x: 1.0 - p.y,
                        y: p.x,
                        z: p.z
                    }));
                }
            });

            // =========================
            // CÂMERA TRASEIRA FORÇADA
            // =========================
            const cameraMP = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({ image: videoElement });
                },
                width: 640,
                height: 480,
                facingMode: "environment" // <<< ISSO É O PRINCIPAL
            });

            cameraMP.start();
        }

    </script>

</body>

</html>
