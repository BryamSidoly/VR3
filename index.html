<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VR Shooter OK</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
button {
  position:absolute;
  top:20px;
  left:20px;
  z-index:10;
  padding:10px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.min.js"></script>
</head>

<body>

<button onclick="enableGyro()">Ativar Sensor</button>
<video id="video" autoplay playsinline style="display:none"></video>

<script>

/* ========================
   CENA
======================== */

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x101020);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* ========================
   PLAYER (HEAD)
======================== */

const player = new THREE.Object3D();
scene.add(player);

const camLeft = new THREE.PerspectiveCamera(75, window.innerWidth/2/window.innerHeight, 0.1, 100);
const camRight = new THREE.PerspectiveCamera(75, window.innerWidth/2/window.innerHeight, 0.1, 100);

const eyeSep = 0.03;
player.add(camLeft);
player.add(camRight);

camLeft.position.x = -eyeSep;
camRight.position.x = eyeSep;

/* ========================
   ARMA + BRAÇO
======================== */

const handGroup = new THREE.Group();
player.add(handGroup);

// braço simples
const arm = new THREE.Mesh(
  new THREE.CylinderGeometry(0.05,0.07,0.5),
  new THREE.MeshBasicMaterial({color:0x888888})
);
arm.rotation.z = Math.PI/2;
handGroup.add(arm);

// mão
const handMesh = new THREE.Mesh(
  new THREE.SphereGeometry(0.08),
  new THREE.MeshBasicMaterial({color:0xffcc99})
);
handGroup.add(handMesh);

// arma
const gun = new THREE.Mesh(
  new THREE.BoxGeometry(0.1,0.1,0.4),
  new THREE.MeshBasicMaterial({color:0x222222})
);
gun.position.z = -0.25;
handGroup.add(gun);

// laser
const laserMat = new THREE.LineBasicMaterial({color:0xff0000});
const laserGeo = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(0,0,0),
  new THREE.Vector3(0,0,-10)
]);
const laser = new THREE.Line(laserGeo, laserMat);
gun.add(laser);

// red dot
const dot = new THREE.Mesh(
  new THREE.SphereGeometry(0.05),
  new THREE.MeshBasicMaterial({color:0xff0000})
);
scene.add(dot);

/* ========================
   REFERÊNCIA VISUAL
======================== */

// chão
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(20,20),
  new THREE.MeshBasicMaterial({color:0x222222, wireframe:true})
);
floor.rotation.x = -Math.PI/2;
floor.position.y = -1;
scene.add(floor);

// cubo central
const cube = new THREE.Mesh(
  new THREE.BoxGeometry(),
  new THREE.MeshBasicMaterial({color:0x00ff00})
);
cube.position.z = -3;
scene.add(cube);

/* ========================
   INIMIGOS
======================== */

const enemies = [];

function spawnEnemy(){
  const e = new THREE.Mesh(
    new THREE.SphereGeometry(0.2),
    new THREE.MeshBasicMaterial({color:0xff0000})
  );

  e.position.set(
    (Math.random()-0.5)*4,
    Math.random()*2,
    -Math.random()*5 - 2
  );

  scene.add(e);
  enemies.push(e);
}

setInterval(spawnEnemy, 1500);

/* ========================
   TIRO
======================== */

const bullets = [];

function shootRay(dir){

  const origin = handGroup.position.clone();

  const ray = new THREE.Raycaster(origin, dir);
  const hits = ray.intersectObjects(enemies);

  if(hits.length > 0){
    const e = hits[0].object;
    scene.remove(e);
    enemies.splice(enemies.indexOf(e),1);
  }
}

/* ========================
   SENSOR
======================== */

function enableGyro(){
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(response => {
        if (response === 'granted') {
          window.addEventListener("deviceorientation", onGyro);
        }
      });
  } else {
    window.addEventListener("deviceorientation", onGyro);
  }
}

function onGyro(e){
  const alpha = e.alpha * Math.PI/180;
  const beta = e.beta * Math.PI/180;

  player.rotation.set(beta, alpha, 0);
}

/* ========================
   MEDIAPIPE (PINCH)
======================== */

const video = document.getElementById("video");

const holistic = new Holistic({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${f}`
});

holistic.setOptions({
  modelComplexity: 0
});

let canShoot = true;

holistic.onResults(r=>{
  if(r.rightHandLandmarks){

    const lm = r.rightHandLandmarks;

    // pontos importantes
    const wrist = lm[0];
    const indexTip = lm[8];

    // converter para espaço 3D simples
    const x = (wrist.x - 0.5) * 2;
    const y = -(wrist.y - 0.5) * 2;
    const z = -wrist.z;

    handGroup.position.set(x, y, -1 + z);

    // direção da arma
    const dir = new THREE.Vector3(
      indexTip.x - wrist.x,
      -(indexTip.y - wrist.y),
      -0.5
    ).normalize();

    // rotação da arma
    const target = new THREE.Vector3().addVectors(handGroup.position, dir);
    gun.lookAt(target);

    // LASER (raycast)
    const raycaster = new THREE.Raycaster(handGroup.position, dir);
    const intersects = raycaster.intersectObjects(enemies);

    if(intersects.length > 0){
      const hit = intersects[0];

      dot.position.copy(hit.point);

      // atualizar laser até o ponto
      laser.geometry.setFromPoints([
        new THREE.Vector3(0,0,0),
        gun.worldToLocal(hit.point.clone())
      ]);

    } else {

      dot.position.copy(
        handGroup.position.clone().add(dir.clone().multiplyScalar(10))
      );

      laser.geometry.setFromPoints([
        new THREE.Vector3(0,0,0),
        new THREE.Vector3(0,0,-10)
      ]);
    }

    // gesto de tiro (pinch)
    const t = lm[4];
    const i = lm[8];
    const d = Math.hypot(t.x-i.x, t.y-i.y);

    if(d < 0.05 && canShoot){
      shootRay(dir);
      canShoot = false;
      setTimeout(()=>canShoot=true, 250);
    }
  }
});

const cam = new Camera(video,{
  onFrame: async ()=>{
    await holistic.send({image: video});
  },
  width:320,
  height:240
});
cam.start();

/* ========================
   LOOP
======================== */

function update(){

  bullets.forEach(b=>{
    b.position.add(b.velocity);
  });

  bullets.forEach(b=>{
    enemies.forEach((e,i)=>{
      if(b.getWorldPosition(new THREE.Vector3()).distanceTo(e.position) < 0.3){
        scene.remove(e);
        enemies.splice(i,1);
      }
    });
  });

}

/* ========================
   RENDER VR (DIVIDIDO)
======================== */

function renderVR(){

  const w = window.innerWidth;
  const h = window.innerHeight;

  renderer.setScissorTest(true);

  // esquerdo
  renderer.setViewport(0,0,w/2,h);
  renderer.setScissor(0,0,w/2,h);
  renderer.render(scene, camLeft);

  // direito
  renderer.setViewport(w/2,0,w/2,h);
  renderer.setScissor(w/2,0,w/2,h);
  renderer.render(scene, camRight);

}

function animate(){
  requestAnimationFrame(animate);
  update();
  renderVR();
}

animate();

</script>
</body>
</html>
