<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>VR Shooter</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
        }

        canvas {
            display: block;
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: monospace;
            z-index: 10;
        }
    </style>
</head>

<body>
    <div id="hud">Score: 0</div>
    <div id="camLabel" style="
        position:absolute;
        bottom:10px;
        left:50%;
        transform:translateX(-50%);
        color:white;
        font-family:monospace;
        z-index:10;
        ">
    </div>

    <video id="camPreview" autoplay playsinline muted style="
        position:absolute;
        bottom:10px;
        right:10px;
        width:120px;
        height:90px;
        border:2px solid white;
        z-index:10;
        ">
    </video>

    <script src="https://cdn.jsdelivr.net/npm/three@0.152/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const video = document.getElementById("camPreview");
        let scene = new THREE.Scene();

        let worldRoot = new THREE.Object3D();
        scene.add(worldRoot);

        let renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        let videoTexture = new THREE.VideoTexture(video);
        videoTexture.colorSpace = THREE.SRGBColorSpace;

        scene.background = videoTexture;

        // Stereo cameras
        let cameraL = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        let cameraR = cameraL.clone();

        let IPD = 0.03;

        // Basic light
        let light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(1, 1, 1);
        scene.add(light);

        // Gun (low poly)
        let gunGeo = new THREE.BoxGeometry(0.1, 0.1, 0.4);
        let gunMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
        let gun = new THREE.Mesh(gunGeo, gunMat);
        worldRoot.add(gun);

        // Laser beam
        let laserMaterial = new THREE.LineBasicMaterial({ color: 0xff0000 });

        let laserPoints = [
            new THREE.Vector3(),
            new THREE.Vector3(0, 0, -5)
        ];

        let laserGeometry = new THREE.BufferGeometry().setFromPoints(laserPoints);
        let laser = new THREE.Line(laserGeometry, laserMaterial);
        scene.add(laser);

        // Impact point (mira)
        let crosshairGeo = new THREE.SphereGeometry(0.03, 8, 8);
        let crosshairMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        let crosshair = new THREE.Mesh(crosshairGeo, crosshairMat);
        scene.add(crosshair);

        // Targets
        let targets = [];
        function spawnTarget() {
            let geo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
            let mat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
            let cube = new THREE.Mesh(geo, mat);
            cube.position.set(
                (Math.random() - 0.5) * 4,
                (Math.random() - 0.5) * 2,
                -Math.random() * 5 - 2
            );
            scene.add(cube);
            targets.push(cube);
        }
        setInterval(spawnTarget, 2000);

        // Score
        let score = 0;
        let hud = document.getElementById("hud");

        // Raycaster
        let raycaster = new THREE.Raycaster();

        // Shoot
        function shoot() {
            let origin = new THREE.Vector3();
            let direction = new THREE.Vector3();

            gun.getWorldPosition(origin);
            gun.getWorldDirection(direction);

            raycaster.set(origin, direction);
            let intersects = raycaster.intersectObjects(targets);

            if (intersects.length > 0) {
                let obj = intersects[0].object;
                scene.remove(obj);
                targets = targets.filter(t => t !== obj);
                score++;
                hud.innerText = "Score: " + score;
            }
        }

        // Orientation
        let rotation = { alpha: 0, beta: 0, gamma: 0 };

        function onOrient(e) {
            rotation.alpha = e.alpha || 0;
            rotation.beta = e.beta || 0;
            rotation.gamma = e.gamma || 0;
        }

        window.addEventListener("deviceorientationabsolute", onOrient);
        window.addEventListener("deviceorientation", onOrient);

        // Apply rotation
        let initialQuaternion = null;

        function updateCamera() {
            const alpha = THREE.MathUtils.degToRad(rotation.alpha || 0);
            const beta = THREE.MathUtils.degToRad(rotation.beta || 0);
            const gamma = THREE.MathUtils.degToRad(rotation.gamma || 0);

            // quaternion base do device
            const deviceQuat = new THREE.Quaternion();

            const euler = new THREE.Euler();
            euler.set(beta, alpha, -gamma, 'YXZ');
            deviceQuat.setFromEuler(euler);

            // correção de tela (rotação física do aparelho)
            const screenAngle = (screen.orientation?.angle || window.orientation || 0);
            const screenQuat = new THREE.Quaternion();
            screenQuat.setFromAxisAngle(
                new THREE.Vector3(0, 0, 1),
                -THREE.MathUtils.degToRad(screenAngle)
            );

            deviceQuat.premultiply(screenQuat);

            if (!initialQuaternion) {
                initialQuaternion = deviceQuat.clone().invert();
            }

            deviceQuat.premultiply(initialQuaternion);

            cameraL.quaternion.copy(deviceQuat);
            cameraR.quaternion.copy(deviceQuat);

            // IPD corrigido (importante: aplicar antes da rotação final da câmera)
            const basePos = new THREE.Vector3();

            cameraL.position.copy(basePos);
            cameraR.position.copy(basePos);

            cameraL.position.add(new THREE.Vector3(-IPD, 0, 0).applyQuaternion(deviceQuat));
            cameraR.position.add(new THREE.Vector3(IPD, 0, 0).applyQuaternion(deviceQuat));
        }

        // MediaPipe Hands
        let handClosed = false;

        const hands = new Hands({
            locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 0,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(results => {
            if (results.multiHandLandmarks.length) {
                let lm = results.multiHandLandmarks[0];

                let thumb = lm[4];
                let index = lm[8];

                let dist = Math.hypot(
                    thumb.x - index.x,
                    thumb.y - index.y
                );

                if (dist < 0.05) {
                    if (!handClosed) {
                        shoot();
                    }
                    handClosed = true;
                } else {
                    handClosed = false;
                }

                // ===== POSIÇÃO LIVRE (independente da câmera) =====
                if (!gun.userData.initialized) {
                    let forward = new THREE.Vector3(0, 0, -1).applyQuaternion(cameraL.quaternion);

                    gun.position.copy(cameraL.position)
                        .add(forward.multiplyScalar(1));

                    gun.userData.initialized = true;
                }

                let handPos = new THREE.Vector3(
                    (lm[9].x - 0.5),
                    -(lm[9].y - 0.5),
                    -(lm[9].z || 0)
                );

                handPos.multiplyScalar(1.2);

                // suavização
                gun.position.lerp(handPos, 0.15);


                // ===== ROTAÇÃO BASEADA NA MÃO =====
                let wrist = lm[0];
                let middle = lm[12];
                // usa o MESMO index já declarado acima

                let forwardDir = new THREE.Vector3(
                    index.x - wrist.x,
                    -(index.y - wrist.y),
                    -(index.z - wrist.z)
                ).normalize();

                let side = new THREE.Vector3(
                    middle.x - wrist.x,
                    -(middle.y - wrist.y),
                    -(middle.z - wrist.z)
                ).normalize();

                let up = new THREE.Vector3().crossVectors(forwardDir, side).normalize();
                side.crossVectors(up, forwardDir).normalize();

                let mat = new THREE.Matrix4();
                mat.makeBasis(side, up, forwardDir);

                let targetQuat = new THREE.Quaternion().setFromRotationMatrix(mat);

                // suavização
                gun.quaternion.slerp(targetQuat, 0.25);

            }
        });

        let camLabel = document.getElementById("camLabel");

        const cam = new Camera(video, {
            onFrame: async () => {
                await hands.send({ image: video });
                if (video.srcObject) {
                    let track = video.srcObject.getVideoTracks()[0];
                    let settings = track.getSettings();
                    // Forçamos a label a mostrar o que o navegador reporta
                    camLabel.innerText = "Camera: " + (settings.facingMode || "Traseira Ativa");
                }
            },
            // Esta é a linha principal que o MediaPipe usa para escolher a câmera
            facingMode: "environment",
            width: 640,
            height: 480
        });

        cam.start().catch(err => {
            console.error("Erro ao iniciar câmera:", err);
            camLabel.innerText = "Erro: Sem permissão ou câmera ocupada.";
        });

        // Fisheye shader (simple)
        const material = new THREE.ShaderMaterial({
            uniforms: {
                tDiffuse: { value: null }
            },
            vertexShader: `
            varying vec2 vUv;
            void main(){
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
            }
            `,
            fragmentShader: `
            uniform sampler2D tDiffuse;
            varying vec2 vUv;

            void main(){
                vec2 uv = vUv*2.0-1.0;
                float r = length(uv);
                uv = uv * (1.0 + 0.5 * r*r);
                uv = uv*0.5+0.5;

                gl_FragColor = texture2D(tDiffuse, uv);
            }
            `
        });

        // Render loop
        function animate() {
            requestAnimationFrame(animate);

            updateCamera();

            // Atualizar laser e mira
            let origin = new THREE.Vector3();
            let direction = new THREE.Vector3();

            // direção baseada na câmera (onde você olha)
            gun.getWorldPosition(origin);
            gun.getWorldDirection(direction);

            raycaster.set(origin, direction);

            let intersects = raycaster.intersectObjects(targets);

            let endPoint;

            if (intersects.length > 0) {
                endPoint = intersects[0].point;
            } else {
                endPoint = origin.clone().add(direction.multiplyScalar(10));
            }

            // Atualiza laser
            laser.geometry.setFromPoints([origin, endPoint]);

            // Atualiza mira
            crosshair.position.copy(endPoint);

            renderer.setScissorTest(true);

            let w = window.innerWidth;
            let h = window.innerHeight;

            // LEFT
            renderer.setViewport(0, 0, w / 2, h);
            renderer.setScissor(0, 0, w / 2, h);
            renderer.render(scene, cameraL);

            // RIGHT
            renderer.setViewport(w / 2, 0, w / 2, h);
            renderer.setScissor(w / 2, 0, w / 2, h);
            renderer.render(scene, cameraR);
        }

        animate();
    </script>
</body>

</html>
