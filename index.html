<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>VR Shooter Hand Tracking</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
        }

        canvas {
            display: block;
        }

        #video {
            position: fixed;
            top: 0;
            left: 0;
            width: 160px;
            height: 120px;
            opacity: 0.01;
            pointer-events: none;
        }

        #ui {
            position: fixed;
            top: 10px;
            left: 10px;
            color: white;
            font-family: sans-serif;
            font-size: 12px;
            z-index: 10;
        }
    </style>

</head>

<body>

    <div id="ui">VR Shooter - Hand Tracking</div>
    <video id="video" autoplay playsinline></video>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>

        let scene, camera, renderer;
        let gun, handMesh;
        let targets = [];
        let handsData = [];
        let screenAngle = 0;
        let deviceQuat = new THREE.Quaternion();

        const zee = new THREE.Vector3(0, 0, 1);
        const euler = new THREE.Euler();
        const q0 = new THREE.Quaternion();
        const q1 = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5));

        let ammo = 10;
        let maxAmmo = 10;
        let canShoot = true;
        let shootCooldown = 200;
        let isReloading = false;
        let recoil = 0;
        let recoilRecover = 0.9;
        let reloadProgress = 0;

        init();
        animate();
        initHandTracking();

        function rotatePoint(x, y, angle) {
            const cx = 0.5;
            const cy = 0.5;
            const dx = x - cx;
            const dy = y - cy;
            const rx = dx * Math.cos(angle) - dy * Math.sin(angle);
            const ry = dx * Math.sin(angle) + dy * Math.cos(angle);

            return {
                x: rx + cx,
                y: ry + cy
            };
        }

        function updateScreenAngle() {
            const angle = screen.orientation?.angle ?? window.orientation ?? 0;

            if (angle === 90) screenAngle = Math.PI / 2;
            else if (angle === -90 || angle === 270) screenAngle = -Math.PI / 2;
            else if (angle === 180 || angle === -180) screenAngle = Math.PI;
            else screenAngle = 0;
        }

        updateScreenAngle();
        window.addEventListener("orientationchange", updateScreenAngle);
        window.addEventListener("resize", updateScreenAngle);

        setTimeout(updateScreenAngle, 300);

        function init() {
            scene = new THREE.Scene();
            window.addEventListener("resize", onResize);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 3);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            document.body.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 5);
            scene.add(light);

            scene.add(new THREE.AmbientLight(0xffffff, 0.4));

            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(50, 50),
                new THREE.MeshStandardMaterial({ color: 0x222222 })
            );

            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);
            gun = new THREE.Group();

            const body = new THREE.Mesh(
                new THREE.BoxGeometry(0.3, 0.1, 0.8),
                new THREE.MeshStandardMaterial({ color: 0x333333 })
            );

            const barrel = new THREE.Mesh(
                new THREE.BoxGeometry(0.1, 0.1, 0.6),
                new THREE.MeshStandardMaterial({ color: 0x777777 })
            );

            barrel.position.z = -0.7;
            gun.add(body);
            gun.add(barrel);

            scene.add(gun);

            for (let i = 0; i < 10; i++) {
                const t = new THREE.Mesh(
                    new THREE.SphereGeometry(0.2, 16, 16),
                    new THREE.MeshStandardMaterial({ color: 0xff4444 })
                );
                t.position.set(
                    (Math.random() - 0.5) * 10,
                    1 + Math.random() * 2,
                    -5 - Math.random() * 20
                );
                scene.add(t);
                targets.push(t);
            }

            window.addEventListener("deviceorientation", (event) => {
                const alpha = THREE.MathUtils.degToRad(event.alpha || 0);
                const beta = THREE.MathUtils.degToRad(event.beta || 0);
                const gamma = THREE.MathUtils.degToRad(event.gamma || 0);
                const orient = THREE.MathUtils.degToRad(
                    screen.orientation?.angle || window.orientation || 0
                );

                euler.set(beta, alpha, -gamma, "YXZ");

                deviceQuat.setFromEuler(euler);
                deviceQuat.multiply(q1);
                deviceQuat.multiply(q0.setFromAxisAngle(zee, -orient));
            });
        }

        function onResize() {
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            updateGunFromHand();
            updateTargets();

            renderVR();

            recoil *= recoilRecover;
            gun.position.z += recoil;
            gun.rotation.x -= recoil * 2;

            updateReload();
            updateUI();
        }

        function updateUI() {
            document.getElementById("ui").innerText =
                `Ammo: ${ammo}/${maxAmmo} ${isReloading ? " | Reloading..." : ""}`;
        }

        function renderVR() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            renderer.setScissorTest(true);
            renderer.setViewport(0, 0, w / 2, h);
            renderer.setScissor(0, 0, w / 2, h);
            camera.position.set(-0.03, 1.6, 3);
            camera.quaternion.copy(deviceQuat);
            renderer.render(scene, camera);
            renderer.setViewport(w / 2, 0, w / 2, h);
            renderer.setScissor(w / 2, 0, w / 2, h);
            camera.position.set(0.03, 1.6, 3);
            camera.quaternion.copy(deviceQuat);
            renderer.render(scene, camera);

            renderer.setScissorTest(false);
        }

        function updateTargets() {
            targets.forEach(t => {
                t.rotation.y += 0.01;
            });
        }

        function updateGunFromHand() {
            if (handsData.length === 0) return;

            const mainHand = handsData[0];
            const wrist = mainHand[0];
            const index = mainHand[8];
            const thumb = mainHand[4];
            const dx = index.x - wrist.x;
            const dy = index.y - wrist.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const x = (index.x - 0.5) * 4;
            const y = (0.5 - index.y) * 3 + 1.5;
            const z = -dist * 8;

            gun.position.set(x, y, z);
            gun.lookAt(
                x + dx * 10,
                y + dy * 10,
                z - 5
            );
            // ===== TIRO (pinça) =====
            const pinch = Math.hypot(
                thumb.x - index.x,
                thumb.y - index.y
            );

            if (pinch < 0.025) {
                shoot();
            }

            // ===== RELOAD (segunda mão abaixo da arma) =====
            if (handsData.length > 1) {
                const secondHand = handsData[1];
                const secondIndex = secondHand[8];
                const gunScreenY = index.y;
                const isBelow = secondIndex.y > gunScreenY + 0.08;
                const closeX = Math.abs(secondIndex.x - index.x) < 0.15;
                if (isBelow && closeX) {
                    startReload();
                }
            }
        }

        function shoot() {
            if (!canShoot || isReloading || ammo <= 0) return;

            canShoot = false;
            ammo--;
            recoil = 0.15;

            const ray = new THREE.Raycaster();
            const dir = new THREE.Vector3(0, 0, -1);
            dir.applyQuaternion(gun.quaternion);

            ray.set(gun.position, dir);

            const hit = ray.intersectObjects(targets);
            if (hit.length > 0) {
                hit[0].object.position.z = -20 - Math.random() * 20;
            }

            setTimeout(() => {
                canShoot = true;
            }, shootCooldown);
        }

        function startReload() {
            if (isReloading || ammo === maxAmmo) return;

            isReloading = true;
            reloadProgress = 0;
        }

        function updateReload() {
            if (!isReloading) return;

            reloadProgress += 0.08;

            // animação mais visível
            gun.position.y -= 0.04;
            gun.rotation.z += 0.02;

            if (reloadProgress >= 1) {
                ammo = maxAmmo;
                isReloading = false;
            }
        }

        function initHandTracking() {
            const videoElement = document.getElementById("video");
            const hands = new Hands({
                locateFile: (file) =>
                    `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7,
                selfieMode: false
            });

            hands.onResults((results) => {
                handsData = [];

                if (results.multiHandLandmarks) {
                    results.multiHandLandmarks.forEach(lm => {

                        const processed = lm.map(p => {
                            const r = rotatePoint(p.x, p.y, screenAngle);
                            return { x: r.x, y: r.y, z: p.z };
                        });

                        handsData.push(processed);
                    });
                }
            });

            const cameraMP = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({ image: videoElement });
                },
                width: 640,
                height: 480,
                facingMode: "environment"
            });

            cameraMP.start();
        }
    </script>
</body>
</html>
