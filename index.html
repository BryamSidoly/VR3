<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>VR Shooter Advanced</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
#video { position:fixed; width:120px; height:90px; opacity:0.01; }
#ui {
  position:fixed; top:10px; left:10px; color:white;
  font-family:Arial; font-size:12px;
}
</style>
</head>
<body>

<div id="ui">VR Shooter Advanced</div>
<video id="video" autoplay playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

// ===================== GLOBAL =====================
let scene, camera, renderer;
let gun;
let enemies = [];
let hand = null;

let ipd = 0.065; // distância olhos
let deviceQuat = new THREE.Quaternion();

let recoil = 0;
let audioCtx;

// filtros mão
let handSmoothed = {x:0,y:0,z:0};
let velocity = {x:0,y:0,z:0};

// ===================== INIT =====================
init();
initAudio();
initHands();
animate();

function init() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);

  renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff,0.5));
  const light = new THREE.DirectionalLight(0xffffff,1);
  light.position.set(3,5,2);
  scene.add(light);

  // chão
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(50,50),
    new THREE.MeshStandardMaterial({color:0x222222})
  );
  floor.rotation.x = -Math.PI/2;
  scene.add(floor);

  // arma
  gun = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(0.3,0.1,0.8),
    new THREE.MeshStandardMaterial({color:0x444444})
  );
  gun.add(body);
  scene.add(gun);

  // inimigos
  for(let i=0;i<8;i++){
    const e = new THREE.Mesh(
      new THREE.SphereGeometry(0.3),
      new THREE.MeshStandardMaterial({color:0xff3333})
    );
    e.position.set((Math.random()-0.5)*10,1,-5-Math.random()*20);
    e.userData.speed = 0.01 + Math.random()*0.02;
    scene.add(e);
    enemies.push(e);
  }

  window.addEventListener("deviceorientation", e=>{
    const euler = new THREE.Euler(
      THREE.MathUtils.degToRad(e.beta||0),
      THREE.MathUtils.degToRad(e.alpha||0),
      -THREE.MathUtils.degToRad(e.gamma||0),
      "YXZ"
    );
    deviceQuat.setFromEuler(euler);
  });

  window.addEventListener("resize",()=>{
    renderer.setSize(innerWidth,innerHeight);
  });
}

// ===================== HAND FILTER (KALMAN SIMPLE) =====================
function smoothHand(x,y,z){
  const alpha = 0.25;

  velocity.x = x - handSmoothed.x;
  velocity.y = y - handSmoothed.y;
  velocity.z = z - handSmoothed.z;

  handSmoothed.x += velocity.x * alpha;
  handSmoothed.y += velocity.y * alpha;
  handSmoothed.z += velocity.z * alpha;
}

// ===================== HAND TRACKING =====================
function initHands(){
  const video = document.getElementById("video");

  const hands = new Hands({
    locateFile: f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });

  hands.setOptions({
    maxNumHands:1,
    minDetectionConfidence:0.7,
    minTrackingConfidence:0.7
  });

  hands.onResults(res=>{
    if(res.multiHandLandmarks){
      hand = res.multiHandLandmarks[0];
    }
  });

  const cam = new Camera(video,{
    onFrame: async ()=>{
      await hands.send({image:video});
    },
    width:640,
    height:480
  });

  cam.start();
}

// ===================== AUDIO =====================
function initAudio(){
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
}

function playShot(){
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.frequency.value = 120;
  g.gain.value = 0.2;
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime+0.05);
}

// ===================== SHOOT =====================
function shoot(){
  playShot();
  recoil = 0.2;

  const ray = new THREE.Raycaster();
  const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);

  ray.set(camera.position, dir);

  const hit = ray.intersectObjects(enemies);
  if(hit.length){
    hit[0].object.position.set(
      (Math.random()-0.5)*10,
      1,
      -10-Math.random()*20
    );
  }
}

// ===================== AI ENEMY =====================
function updateEnemies(){
  enemies.forEach(e=>{
    const dir = camera.position.clone().sub(e.position).normalize();
    e.position.add(dir.multiplyScalar(e.userData.speed));

    if(e.position.distanceTo(camera.position)<1.5){
      e.position.z = -10;
    }
  });
}

// ===================== HAND CONTROL =====================
function updateHand(){

  if(!hand) return;

  const wrist = hand[0];
  const index = hand[8];
  const thumb = hand[4];

  const dx = index.x - wrist.x;
  const dy = index.y - wrist.y;
  const dz = Math.sqrt(dx*dx+dy*dy);

  const x = (index.x-0.5)*4;
  const y = -(index.y-0.5)*3+1.5;
  const z = -dz*10;

  smoothHand(x,y,z);

  gun.position.set(
    handSmoothed.x,
    handSmoothed.y,
    handSmoothed.z
  );

  gun.rotation.y = dx*2;
  gun.rotation.x = -dy*2;

  // recoil
  gun.position.z += recoil;
  recoil *= 0.9;

  // pinch shoot
  const pinch = Math.hypot(thumb.x-index.x, thumb.y-index.y);
  if(pinch < 0.03) shoot();
}

// ===================== VR RENDER =====================
function renderVR(){

  const w = innerWidth;
  const h = innerHeight;

  renderer.setScissorTest(true);

  const eyes = [-ipd/2, ipd/2];

  eyes.forEach((eye,i)=>{
    camera.position.set(eye,1.6,3);
    camera.quaternion.copy(deviceQuat);

    renderer.setViewport(i*w/2,0,w/2,h);
    renderer.setScissor(i*w/2,0,w/2,h);

    renderer.render(scene,camera);
  });

  renderer.setScissorTest(false);
}

// ===================== LOOP =====================
function animate(){
  requestAnimationFrame(animate);

  updateHand();
  updateEnemies();

  renderVR();
}

</script>
</body>
</html>
